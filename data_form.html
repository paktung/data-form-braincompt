<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pengisian</title>
</head>
<body>
  <h2>Form Pengisian</h2>
  <form id="dataForm">
    <label for="nama">Nama:</label>
    <input type="text" id="nama" name="nama" required><br><br>

    <label for="unit">Unit Kerja:</label>
    <input type="text" id="unit" name="unit" required><br><br>

    <label for="nomorWA">Nomor WA:</label>
    <input type="text" id="nomorWA" name="nomorWA" required><br><br>

    <label for="jenjang">Jenjang:</label>
    <input type="text" id="jenjang" name="jenjang" required><br><br>

    <button type="submit">Kirim</button>
  </form>

  <script>
    // Menangani pengiriman form
    document.getElementById('dataForm').addEventListener('submit', function(event) {
      event.preventDefault(); // Mencegah form dikirim secara default

      const formData = new FormData(event.target);

      // Mengambil nilai dari form
      const data = {
        nama: formData.get('nama'),
        unit: formData.get('unit'),
        nomorWA: formData.get('nomorWA'),
        jenjang: formData.get('jenjang')
      };

      // Mengirim data ke Google Apps Script
      fetch('https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
        mode: 'cors' // Menambahkan mode CORS
      })
      .then(response => response.json())
      .then(responseData => {
        if(responseData.result === "success") {
          console.log('Success:', responseData);
          alert('Data berhasil dikirim!');
        } else {
          console.error('Error: Data tidak diterima dengan benar');
          alert('Terjadi kesalahan saat mengirim data.');
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Terjadi kesalahan saat mengirim data.');
      });
    });
  </script>
</body>
</html>
