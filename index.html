<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pendaftaran</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .toast-enter { animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
    .field-focus:focus-within label { color: var(--primary); }
    .field-focus:focus-within .input-border { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(var(--primary-rgb), 0.1); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background: var(--bg);">
   <div class="min-h-full flex items-center justify-center p-4 sm:p-8">
    <div class="w-full max-w-lg"><!-- Header -->
     <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4" style="background: var(--primary); color: var(--surface);"><i data-lucide="clipboard-list" style="width:32px;height:32px;"></i>
      </div>
      <h1 id="formTitle" class="text-3xl font-800 tracking-tight" style="color: var(--text);"></h1>
      <p id="formSubtitle" class="mt-2 text-base" style="color: var(--text); opacity:0.6;"></p>
     </div><!-- Form Card -->
     <div class="rounded-2xl p-6 sm:p-8 shadow-lg" style="background: var(--surface); border: 1px solid rgba(0,0,0,0.06);">
      <form id="regForm" novalidate><!-- Nama -->
       <div class="field-focus mb-5"><label for="nama" class="block text-sm font-600 mb-1.5 transition-colors" style="color: var(--text);">Nama Lengkap</label> <input type="text" id="nama" name="nama" required placeholder="Masukkan nama lengkap" class="input-border w-full px-4 py-3 rounded-xl text-sm outline-none transition-all border" style="background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.12);">
        <p class="err text-xs mt-1 hidden" style="color:#e53e3e;">Nama wajib diisi</p>
       </div><!-- Unit -->
       <div class="field-focus mb-5"><label for="unit" class="block text-sm font-600 mb-1.5 transition-colors" style="color: var(--text);">Unit</label> <input type="text" id="unit" name="unit" required placeholder="Masukkan unit/bagian" class="input-border w-full px-4 py-3 rounded-xl text-sm outline-none transition-all border" style="background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.12);">
        <p class="err text-xs mt-1 hidden" style="color:#e53e3e;">Unit wajib diisi</p>
       </div><!-- Nomor WA -->
       <div class="field-focus mb-5"><label for="nomorWA" class="block text-sm font-600 mb-1.5 transition-colors" style="color: var(--text);">Nomor WhatsApp</label>
        <div class="flex items-center gap-2"><span class="flex-shrink-0 px-3 py-3 rounded-xl text-sm font-600 border" style="background: var(--bg); color: var(--text); opacity:0.6; border-color: rgba(0,0,0,0.12);">+62</span> <input type="tel" id="nomorWA" name="nomorWA" required placeholder="8xxxxxxxxxx" class="input-border w-full px-4 py-3 rounded-xl text-sm outline-none transition-all border" style="background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.12);">
        </div>
        <p class="err text-xs mt-1 hidden" style="color:#e53e3e;">Nomor WhatsApp wajib diisi</p>
       </div><!-- Jenjang -->
       <div class="field-focus mb-6"><label class="block text-sm font-600 mb-2.5 transition-colors" style="color: var(--text);">Jenjang</label>
        <div id="jenjangOptions" class="grid grid-cols-2 gap-2.5"><!-- Options rendered by JS -->
        </div>
        <p class="err text-xs mt-1 hidden" style="color:#e53e3e;">Pilih salah satu jenjang</p>
       </div><!-- Bukti Transfer -->
       <div class="field-focus mb-6"><label for="bukti" class="block text-sm font-600 mb-2.5 transition-colors" style="color: var(--text);">Bukti Transfer</label>
        <div class="relative"><input type="file" id="bukti" name="bukti" accept="image/*,.pdf" class="hidden" onchange="handleFileSelect(event)"> <label for="bukti" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-600 border-2 cursor-pointer transition-all" style="background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.12); border-style: dashed;"> <i data-lucide="upload" style="width:18px;height:18px;"></i> <span id="fileLabel">Pilih file bukti transfer</span> </label>
        </div>
        <p id="fileName" class="text-xs mt-1.5 font-500" style="color: var(--primary);"></p>
        <p class="err text-xs mt-1 hidden" style="color:#e53e3e;">Bukti transfer wajib diunggah</p>
       </div><!-- Submit --> <button type="submit" id="submitBtn" class="w-full py-3.5 rounded-xl font-700 text-sm tracking-wide transition-all hover:shadow-lg active:scale-[0.98]" style="background: var(--primary); color: var(--surface);"> <span id="btnText"></span> <span id="btnLoading" class="hidden inline-flex items-center gap-2">
         <svg class="animate-spin h-4 w-4" viewbox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" /><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
         </svg> Mengirim... </span> </button>
      </form>
     </div><!-- Toast -->
     <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 hidden z-50">
      <div class="toast-enter px-5 py-3 rounded-xl shadow-xl text-sm font-600 flex items-center gap-2" style="background: var(--text); color: var(--surface);"><i data-lucide="check-circle" style="width:18px;height:18px;"></i> <span id="toastMsg"></span>
      </div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxkh4DUEbsPfsZuSzSJ57gVriOaqe3DvQ-f-d1NmSOhc7TrYOnf8Q5EHS1_FQlQnwJ8Mw/exec';
    const SHEET_ID = '1T3pGYDhZ698RmXJQTHzNMvajxwj_MRvasDUlWkgjEu0';
    const FOLDER_ID = '1pmnCiFDLGUWaWqhUcsp7-Wxfh3qHSqSy';

    const jenjangList = ['PAUD/TK', 'SD', 'SLTP', 'SLTA', 'SARJANA', 'S2'];
    let selectedJenjang = '';
    let buktiFile = null;
    let fileBase64 = '';
    let fileMimeType = '';
    let fileName = '';

    const defaultConfig = {
      form_title: 'Form Pendaftaran',
      subtitle_text: 'Silakan lengkapi data di bawah ini',
      submit_button_text: 'Kirim Data',
      background_color: '#f0f4f8',
      surface_color: '#ffffff',
      text_color: '#1a2332',
      primary_color: '#2563eb',
      secondary_color: '#64748b'
    };

    function applyColors(c) {
      const root = document.documentElement;
      root.style.setProperty('--bg', c.background_color || defaultConfig.background_color);
      root.style.setProperty('--surface', c.surface_color || defaultConfig.surface_color);
      root.style.setProperty('--text', c.text_color || defaultConfig.text_color);
      root.style.setProperty('--primary', c.primary_color || defaultConfig.primary_color);
      root.style.setProperty('--secondary', c.secondary_color || defaultConfig.secondary_color);
      const hex = c.primary_color || defaultConfig.primary_color;
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      root.style.setProperty('--primary-rgb', `${r},${g},${b}`);
    }

    function renderJenjang() {
      const container = document.getElementById('jenjangOptions');
      container.innerHTML = '';
      jenjangList.forEach(j => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'px-4 py-2.5 rounded-xl text-sm font-600 border-2 transition-all';
        const active = selectedJenjang === j;
        btn.style.cssText = active
          ? `background: var(--primary); color: var(--surface); border-color: var(--primary);`
          : `background: var(--bg); color: var(--text); border-color: rgba(0,0,0,0.1);`;
        btn.textContent = j;
        btn.onclick = () => { selectedJenjang = j; renderJenjang(); };
        container.appendChild(btn);
      });
    }

    function showToast(msg, isError) {
      const toast = document.getElementById('toast');
      const toastDiv = toast.querySelector('div');
      document.getElementById('toastMsg').textContent = msg;
      toastDiv.style.background = isError ? '#e53e3e' : (window.elementSdk?.config?.text_color || defaultConfig.text_color);
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function validate() {
      let valid = true;
      const fields = [
        { el: document.getElementById('nama'), errIdx: 0 },
        { el: document.getElementById('unit'), errIdx: 1 },
        { el: document.getElementById('nomorWA'), errIdx: 2 }
      ];
      const errs = document.querySelectorAll('.err');
      errs.forEach(e => e.classList.add('hidden'));

      fields.forEach(({ el, errIdx }) => {
        if (!el.value.trim()) { errs[errIdx].classList.remove('hidden'); valid = false; }
      });
      if (!selectedJenjang) { errs[3].classList.remove('hidden'); valid = false; }
      if (!buktiFile) { errs[4].classList.remove('hidden'); valid = false; }
      return valid;
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (file) {
        // Validasi ukuran file (max 2MB)
        if (file.size > 2 * 1024 * 1024) {
          showToast('Ukuran file maksimal 2MB', true);
          e.target.value = '';
          buktiFile = null;
          fileBase64 = '';
          fileMimeType = '';
          fileName = '';
          document.getElementById('fileName').textContent = '';
          return;
        }

        const reader = new FileReader();
        reader.onload = function(event) {
          // Extract base64 tanpa data URL prefix
          const base64String = event.target.result.split(',')[1];
          fileBase64 = base64String;
          fileMimeType = file.type;
          fileName = file.name;
          buktiFile = file;
          
          document.getElementById('fileName').textContent = `✓ ${file.name} (${(file.size / 1024).toFixed(2)}KB)`;
          document.getElementById('fileLabel').textContent = 'Ganti file';
        };
        reader.onerror = function() {
          showToast('Gagal membaca file', true);
          e.target.value = '';
          buktiFile = null;
          fileBase64 = '';
          fileMimeType = '';
          fileName = '';
        };
        reader.readAsDataURL(file);
      }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      // Validasi file sudah di-load
      if (!fileBase64) {
        showToast('Mohon tunggu sebentar, file sedang diproses. Atau coba pilih ulang file.', true);
        return;
      }

      const btn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnLoad = document.getElementById('btnLoading');
      btn.disabled = true;
      btnText.classList.add('hidden');
      btnLoad.classList.remove('hidden');

      // Buat FormData seperti contoh yang diberikan
      const formData = new FormData();
      formData.append('nama', document.getElementById('nama').value.trim());
      formData.append('unit', document.getElementById('unit').value.trim());
      formData.append('nomorWA', document.getElementById('nomorWA').value.trim());
      formData.append('jenjang', selectedJenjang);
      formData.append('fileData', fileBase64);
      formData.append('mimeType', fileMimeType);
      formData.append('fileName', fileName);

      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: formData
        });
        
        const text = await res.text();
        console.log('Raw response:', text);
        
        let result;
        try {
          result = JSON.parse(text);
        } catch (e) {
          console.error('Failed to parse JSON:', e);
          showToast('Respons server tidak valid', true);
          btn.disabled = false;
          btnText.classList.remove('hidden');
          btnLoad.classList.add('hidden');
          return;
        }
        
        if (result.result === "success") {
          showToast('Data berhasil dikirim!', false);
          document.getElementById('regForm').reset();
          selectedJenjang = '';
          buktiFile = null;
          fileBase64 = '';
          fileMimeType = '';
          fileName = '';
          document.getElementById('fileName').textContent = '';
          document.getElementById('fileLabel').textContent = 'Pilih file bukti transfer';
          renderJenjang();
        } else {
          showToast(result.error || 'Gagal mengirim data', true);
        }
        
      } catch (err) {
        console.error('Fetch error:', err);
        showToast('Gagal mengirim data. Periksa koneksi internet atau URL Apps Script.', true);
      } finally {
        btn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoad.classList.add('hidden');
      }
    });

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        const c = { ...defaultConfig, ...config };
        applyColors(c);
        document.getElementById('formTitle').textContent = c.form_title;
        document.getElementById('formSubtitle').textContent = c.subtitle_text;
        document.getElementById('btnText').textContent = c.submit_button_text;

        if (c.font_family) {
          document.getElementById('app').style.fontFamily = `${c.font_family}, 'Plus Jakarta Sans', sans-serif`;
        }
        if (c.font_size) {
          const b = c.font_size;
          document.getElementById('formTitle').style.fontSize = `${b * 1.875}px`;
          document.getElementById('formSubtitle').style.fontSize = `${b}px`;
        }

        // Recolor submit button
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.style.background = c.primary_color || defaultConfig.primary_color;
        submitBtn.style.color = c.surface_color || defaultConfig.surface_color;

        renderJenjang();
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
          { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family || 'Plus Jakarta Sans', set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || 16, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['form_title', config.form_title || defaultConfig.form_title],
        ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text],
        ['submit_button_text', config.submit_button_text || defaultConfig.submit_button_text]
      ])
    });

    applyColors(defaultConfig);
    renderJenjang();
    lucide.createIcons();
  </script>

</html>
